<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Static Analog Clock Demo</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="demo-shell">
      <header class="demo-header">
        <h1>Static Analog Clock</h1>
        <p id="demo-status" aria-live="polite">15:45</p>
      </header>
      <section class="clock-row" aria-label="דמו שעון מוצרי בשלושה גדלים">
        <div class="clock-box clock-box--small" data-demo-clock></div>
        <div class="clock-box clock-box--medium" data-demo-clock></div>
        <div class="clock-box clock-box--large" data-demo-clock></div>
      </section>
      <div class="demo-controls" aria-label="בחירת זמן">
        <button type="button" data-time="0:0">00:00</button>
        <button type="button" data-time="6:30">06:30</button>
        <button type="button" data-time="15:45">15:45</button>
      </div>
    </main>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
