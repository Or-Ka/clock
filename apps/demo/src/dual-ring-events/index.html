<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>שעון יומי</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="phase3-demo">
      <section class="workspace" aria-label="שעון והגדרות">
        <section class="clock-panel" aria-label="שעון חי עם טבעות אירועים">
          <div class="clock-toolbar">
            <button
              id="display-preferences-toggle"
              class="icon-button display-preferences-toggle"
              type="button"
              aria-label="העדפות תצוגה"
              aria-expanded="false"
              aria-controls="display-preferences-panel"
            >
              ⚙
            </button>
            <p id="clock-status" aria-live="polite">--:--</p>
          </div>
          <div class="clock-mount" id="phase3-clock"></div>
        </section>

        <section
          id="display-preferences-panel"
          class="display-preferences-panel"
          aria-labelledby="display-preferences-title"
          hidden
        >
          <h2 id="display-preferences-title">העדפות תצוגה</h2>

          <div class="control-group">
            <label for="display-template">סגנון תצוגה</label>
            <select id="display-template">
              <option value="classic">קלאסי בהיר</option>
              <option value="night">לילה שקט</option>
              <option value="paper">לוח נייר</option>
              <option value="focus">פוקוס חד</option>
              <option value="festival">חגיגי</option>
            </select>
          </div>

          <div class="control-group">
            <label for="display-mode">מצב תצוגה</label>
            <select id="display-mode">
              <option value="fullMode">מצב מלא</option>
              <option value="clockOnly">שעון בלבד</option>
              <option value="floatingClock">שעון צף 200×200</option>
            </select>
          </div>

          <div class="time-fields">
            <div class="control-group">
              <label for="display-font-family">פונט</label>
              <select id="display-font-family">
                <option value="system">מערכת</option>
                <option value="serif">ספרותי</option>
                <option value="mono">טכני</option>
                <option value="rounded">מעוגל</option>
              </select>
            </div>

            <div class="control-group">
              <label for="display-font-scale">גודל</label>
              <input id="display-font-scale" type="range" min="90" max="118" step="2" value="100" />
            </div>
          </div>

          <div class="display-color-grid" aria-label="צבעי תצוגה">
            <label>
              רקע
              <input id="display-background-color" type="color" />
            </label>
            <label>
              פאנלים
              <input id="display-panel-color" type="color" />
            </label>
            <label>
              טקסט
              <input id="display-text-color" type="color" />
            </label>
            <label>
              הדגשה
              <input id="display-accent-color" type="color" />
            </label>
            <label>
              פני שעון
              <input id="display-clock-face-color" type="color" />
            </label>
          </div>
        </section>

        <aside class="event-panel" aria-label="ניהול אירועים">
          <section class="settings-block" aria-labelledby="location-settings-title">
            <h2 id="location-settings-title">הגדרות מיקום</h2>

            <div class="control-group">
              <label for="location">מיקום</label>
              <select id="location">
                <option value="jerusalem">ירושלים</option>
                <option value="tel-aviv">תל אביב</option>
                <option value="haifa">חיפה</option>
                <option value="london">לונדון</option>
                <option value="new-york">ניו יורק</option>
              </select>
            </div>

            <div class="control-group">
              <label for="timezone">אזור זמן של המיקום</label>
              <select id="timezone" disabled aria-describedby="day-times-status">
                <option value="Asia/Jerusalem">Asia/Jerusalem</option>
                <option value="UTC">UTC</option>
                <option value="America/New_York">America/New_York</option>
                <option value="Europe/London">Europe/London</option>
              </select>
            </div>

            <p id="day-times-status" class="helper-text" aria-live="polite">
              זמני זריחה ושקיעה ייטענו לפי המיקום והתאריך של היום.
            </p>

            <div class="control-group">
              <label for="zmanit-set">בחר סט שעות זמניות</label>
              <select id="zmanit-set" aria-describedby="zmanit-set-status"></select>
            </div>

            <p id="zmanit-set-status" class="helper-text" aria-live="polite"></p>

            <fieldset class="layer-controls" aria-label="שכבות תצוגה">
              <legend>שכבות תצוגה</legend>
              <label>
                <input type="checkbox" data-layer-toggle="day-times" checked />
                זמני היום
              </label>
              <label>
                <input type="checkbox" data-layer-toggle="personal" checked />
                אירועים אישיים
              </label>
              <label>
                <input type="checkbox" data-layer-toggle="special" checked />
                אירועים מיוחדים
              </label>
              <label>
                <input type="checkbox" data-zmanit-layer-toggle checked />
                שעות זמניות
              </label>
            </fieldset>

            <fieldset class="layer-controls alert-master-controls" aria-label="הגדרות התראות ויבוא יצוא">
              <legend>התראות ונתונים</legend>
              <label>
                <input id="alerts-enabled" type="checkbox" checked />
                התראות פעילות
              </label>
              <div class="import-export-actions">
                <button id="export-demo-state" type="button">ייצוא</button>
                <button id="import-demo-state" type="button">ייבוא</button>
                <input id="import-demo-state-file" class="visually-hidden" type="file" accept="application/json,.json" />
              </div>
              <p id="import-export-status" class="helper-text" aria-live="polite"></p>
            </fieldset>
          </section>

          <section class="settings-block add-event-block" aria-labelledby="add-event-title">
            <h2 id="add-event-title">הוספת אירוע</h2>
            <div class="add-event-actions" role="group" aria-label="בחירת סוג אירוע להוספה">
              <button type="button" data-event-form-toggle="regular" aria-controls="event-form" aria-expanded="false">
                אירוע רגיל
              </button>
              <button
                type="button"
                data-event-form-toggle="special"
                aria-controls="derived-event-form"
                aria-expanded="false"
              >
                אירוע מיוחד
              </button>
            </div>

          <form
            id="event-form"
            class="event-form add-event-form"
            data-add-event-form="regular"
            aria-labelledby="event-settings-title"
            hidden
            novalidate
          >
            <h2 id="event-settings-title">הגדרות אירוע</h2>

            <div class="control-group">
              <label for="event-kind">סוג אירוע</label>
              <select id="event-kind">
                <option value="custom">אירוע מותאם</option>
                <option value="sunrise">זריחה</option>
                <option value="sunset">שקיעה</option>
              </select>
            </div>

            <div class="control-group">
              <label for="event-title">שם האירוע</label>
              <input id="event-title" type="text" value="ריכוז" maxlength="18" />
            </div>

            <div class="time-fields">
              <div class="control-group">
                <label for="event-hour">שעה</label>
                <input id="event-hour" type="number" min="0" max="23" value="14" inputmode="numeric" />
              </div>
              <div class="control-group">
                <label for="event-minute">דקה</label>
                <input id="event-minute" type="number" min="0" max="59" value="30" inputmode="numeric" />
              </div>
            </div>

            <fieldset class="event-alert-form" data-alert-form-settings="regular">
              <legend>התראה</legend>
              <div class="event-alert-form-grid">
                <label class="event-alert-check">
                  <input id="event-alert-enabled" type="checkbox" />
                  פעילה
                </label>
                <label class="event-alert-check">
                  <input id="event-alert-sound" type="checkbox" checked />
                  קול
                </label>
                <label class="event-alert-check">
                  <input id="event-alert-desktop" type="checkbox" />
                  דסקטופ
                </label>
                <div class="control-group">
                  <label for="event-alert-direction">תזמון</label>
                  <select id="event-alert-direction">
                    <option value="before">לפני</option>
                    <option value="after">אחרי</option>
                  </select>
                </div>
                <div class="control-group">
                  <label for="event-alert-offset">כמות</label>
                  <input id="event-alert-offset" type="number" min="0" step="1" value="5" inputmode="numeric" />
                </div>
                <div class="control-group">
                  <label for="event-alert-offset-unit">יחידה</label>
                  <select id="event-alert-offset-unit">
                    <option value="minutes">דקות</option>
                    <option value="hours">שעות</option>
                  </select>
                </div>
              </div>
            </fieldset>

            <p id="event-error" class="form-error" role="alert" aria-live="polite"></p>
            <button type="submit">שמירה</button>
          </form>

          <form
            id="derived-event-form"
            class="event-form add-event-form"
            data-add-event-form="special"
            aria-labelledby="special-event-settings-title"
            hidden
            novalidate
          >
            <h2 id="special-event-settings-title">הגדרות אירוע מיוחד</h2>

            <div class="control-group">
              <label for="derived-event-title">שם אירוע מיוחד</label>
              <input id="derived-event-title" type="text" value="לפני שקיעה" maxlength="18" />
            </div>

            <div class="control-group">
              <label for="derived-event-base">מבוסס על</label>
              <select id="derived-event-base">
                <option value="sunset">שקיעה</option>
                <option value="sunrise">זריחה</option>
                <option value="zmanit-1">שעה זמנית 1</option>
                <option value="zmanit-2">שעה זמנית 2</option>
                <option value="zmanit-3">שעה זמנית 3</option>
                <option value="zmanit-4">שעה זמנית 4</option>
                <option value="zmanit-5">שעה זמנית 5</option>
                <option value="zmanit-6">שעה זמנית 6</option>
                <option value="zmanit-7">שעה זמנית 7</option>
                <option value="zmanit-8">שעה זמנית 8</option>
                <option value="zmanit-9">שעה זמנית 9</option>
                <option value="zmanit-10">שעה זמנית 10</option>
                <option value="zmanit-11">שעה זמנית 11</option>
                <option value="zmanit-12">שעה זמנית 12</option>
              </select>
            </div>

            <div class="time-fields">
              <div class="control-group">
                <label for="derived-event-direction">כיוון</label>
                <select id="derived-event-direction">
                  <option value="before">לפני</option>
                  <option value="after">אחרי</option>
                </select>
              </div>
              <div class="control-group">
                <label for="derived-event-offset">כמות</label>
                <input id="derived-event-offset" type="number" min="0" step="0.25" value="1" inputmode="decimal" />
              </div>
            </div>

            <div class="control-group">
              <label for="derived-event-offset-unit">יחידה</label>
              <select id="derived-event-offset-unit">
                <option value="hours">שעות</option>
                <option value="minutes">דקות</option>
                <option value="zmanit-hours">שעות זמניות</option>
              </select>
            </div>

            <fieldset class="event-alert-form" data-alert-form-settings="special">
              <legend>התראה</legend>
              <div class="event-alert-form-grid">
                <label class="event-alert-check">
                  <input id="derived-event-alert-enabled" type="checkbox" />
                  פעילה
                </label>
                <label class="event-alert-check">
                  <input id="derived-event-alert-sound" type="checkbox" checked />
                  קול
                </label>
                <label class="event-alert-check">
                  <input id="derived-event-alert-desktop" type="checkbox" />
                  דסקטופ
                </label>
                <div class="control-group">
                  <label for="derived-event-alert-direction">תזמון</label>
                  <select id="derived-event-alert-direction">
                    <option value="before">לפני</option>
                    <option value="after">אחרי</option>
                  </select>
                </div>
                <div class="control-group">
                  <label for="derived-event-alert-offset">כמות</label>
                  <input id="derived-event-alert-offset" type="number" min="0" step="1" value="5" inputmode="numeric" />
                </div>
                <div class="control-group">
                  <label for="derived-event-alert-offset-unit">יחידה</label>
                  <select id="derived-event-alert-offset-unit">
                    <option value="minutes">דקות</option>
                    <option value="hours">שעות</option>
                  </select>
                </div>
              </div>
            </fieldset>

            <p id="derived-event-error" class="form-error" role="alert" aria-live="polite"></p>
            <button type="submit">שמירה</button>
          </form>
          </section>

          <section class="settings-block event-list-block" aria-labelledby="event-list-title">
            <h2 id="event-list-title">רשימת אירועים</h2>
            <ul id="event-list" class="event-list" aria-label="רשימת אירועים"></ul>
            <p class="helper-text">
              זמני הזריחה והשקיעה נטענים מ־<a href="https://sunrise-sunset.org/api">API זריחה ושקיעה</a>.
            </p>
          </section>

          <section class="settings-block fixed-day-times-block" aria-labelledby="fixed-day-times-title">
            <h2 id="fixed-day-times-title">אירועים קבועים</h2>
            <div class="fixed-day-time-list" id="fixed-day-time-list" aria-label="אירועים קבועים לפי זריחה ושקיעה"></div>
            <p id="fixed-day-time-status" class="helper-text" aria-live="polite"></p>
          </section>
        </aside>
      </section>
    </main>
    <div class="dev-stamp no-print">
      <a
        class="dev-stamp-link"
        href="https://github.com/Or-Ka"
        target="_blank"
        rel="noreferrer"
        aria-label="Open Orka GitHub profile"
      >
        <span class="dev-stamp-tooltip" aria-hidden="true">
          <img src="./dev.gif" alt="" />
        </span>
        <span class="dev-stamp-text">dev by Orka</span>
      </a>
    </div>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
